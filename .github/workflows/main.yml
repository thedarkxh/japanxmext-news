name: Cross-Platform Build

on: [push, workflow_dispatch]

jobs:
  build:
    strategy:
      matrix:
        # Build for all three major OS targets
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install customtkinter curl_cffi pyinstaller

      - name: Build Executable
        shell: bash
        run: |
          # Use different naming/extension based on the OS
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            pyinstaller --noconfirm --onefile --windowed --name "Japan_Recon_v12_Win" gui_main.py
          elif [ "${{ matrix.os }}" == "macos-latest" ]; then
            pyinstaller --noconfirm --onefile --windowed --name "Japan_Recon_v12_Mac" gui_main.py
          else
            pyinstaller --noconfirm --onefile --name "Japan_Recon_v12_Linux" gui_main.py
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: JapanRecon-${{ matrix.os }}
          path: dist/*
